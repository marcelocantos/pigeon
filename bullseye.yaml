schema_version: 1
targets:
  T1:
    name: Pigeon is a complete library for opaque authenticated relay
    status: converging
    value: 5.0
    cost: 3.0
    acceptance:
    - All crypto, protocol state machines, code generators, QR helper, and Swift package live in pigeon
    - Applications import pigeon rather than duplicating relay/pairing logic
    context: Parent target for the pigeon library. 7/8 sub-targets achieved — only T1.8 (jevon imports) remains.
    depends_on:
    - T1.1
    - T15
    origin: bootstrap from targets.md (T1)
    discovered: 2026-04-08
  T1.1:
    name: Jevon imports pigeon's packages
    status: identified
    value: 5.0
    cost: 3.0
    acceptance:
    - Jevon's internal/crypto/, internal/protocol/, internal/qr/, and cmd/protogen/ are replaced by imports from pigeon
    - iOS app imports the Pigeon SPM package
    context: 'Pigeon side is done: v0.15.0 is tagged and released, containing the crypto, protocol, QR helper, and protogen packages that Jevon needs to consume. Actual completion lives in the external github.com/marcelocantos/jevon repo and cannot be verified from inside pigeon — it needs Jevon''s internal/crypto, internal/protocol, internal/qr, and cmd/protogen deleted and replaced by pigeon imports, plus the iOS app switched to the Pigeon SPM package. Retire on user confirmation, or after observing a Jevon commit that drops its internal copies. Consider moving this target to the Jevon repo''s own targets.yaml once bullseye is set up there, and replacing it here with something narrower like "pigeon has everything Jevon needs, tagged and documented" (already true).'
