  T11:
    name: Pure C client library with struct-based zero-allocation API
    status: identified
    value: 5.0
    cost: 8.0
    observable: true
    acceptance:
    - pigeon_ctx struct contains all state — keypair, session keys, nonce counters, state machine, pairing record, conn, message buffers
    - Library makes zero heap allocations — user owns the pigeon_ctx however they want (stack, static, embedded)
    - 'PIGEON_MAX_MSG is the sole #define configuration knob'
    - pigeon_init takes a pigeon_ctx* and is infallible for memory
    - 'Crypto via libsodium or BoringSSL C API: X25519, AES-256-GCM, HKDF-SHA256, 6-digit confirmation code'
    - QUIC transport via ngtcp2 (pure C, custom allocator capable)
    - Pairing state machine generated by protogen C backend (cgen.go) from protocol/pairing.yaml
    - 'Wire framing: 4-byte big-endian length prefix'
    - Send/Recv (reliable) and SendDatagram/RecvDatagram (unreliable) work end-to-end through relay
    - PairingRecord serialisation without cJSON — hand-coded fixed-schema parser to stay zero-alloc
    context: 'Pigeon currently has Go, Swift, and Kotlin clients. A pure C library maximises portability — embedded targets, game engines, FFI from any language — with no hidden allocations. The entire library state lives in a pigeon_ctx struct sized at compile time. The only dependency choice that matters is QUIC: ngtcp2 over quiche to keep the whole chain redirectable to caller-controlled memory. C23 constexpr would eliminate the last #define but C11/C17 compatibility requires it. Protogen needs a new cgen.go backend to emit the pairing state machine as C structs and dispatch tables.'
    depends_on:
    - T11.1
    - T11.2
    - T11.3
    - T11.4
    origin: manual
    discovered: 2026-04-12
  T11.1:
    name: C codegen naming matches pigeon.h and test expectations
    status: achieved
    value: 5.0
    cost: 3.0
    acceptance:
    - C library compiles with generated state machine headers without type errors
    - pigeon_ctx uses generated types directly (no manual typedefs bridging old/new names)
    - test_pigeon.c compiles and passes against the generated machine
    - make test-c passes
    context: cgen.go generates composed-actor names like pigeon_ios_pairing_machine / pigeon_ios_pairing_step, but pigeon.h and test_pigeon.c reference the flat names pigeon_ios_machine / pigeon_ios_step / PIGEON_APP_IDLE. The build can't compile as-is. Either cgen.go needs to emit flat aliases for the top-level composed actor, or pigeon.h and tests need to use the composed names. The codegen approach is preferable — the C API should present flat names for the top-level machine the app uses.
    origin: manual
    discovered: 2026-04-14
    achieved: 2026-04-14
  T11.2:
    name: Send/Recv path integrates E2E encryption
    status: identified
    value: 5.0
    cost: 3.0
    acceptance:
    - pigeon_send encrypts via stream_channel before framing when channel is established
    - pigeon_recv decrypts after deframing when channel is established
    - pigeon_send_datagram / pigeon_recv_datagram use datagram_channel similarly
    - Cross-language test vectors still pass
    context: pigeon_send/pigeon_recv do raw framing but don't call channel encrypt/decrypt. The crypto API exists (pigeon_channel_encrypt/decrypt) but isn't wired into the send/recv path. After pairing establishes session keys, all traffic should be encrypted.
    depends_on:
    - T11.1
    origin: manual
    discovered: 2026-04-14
  T11.3:
    name: PairingRecord hand-coded fixed-schema serialisation
    status: achieved
    value: 3.0
    cost: 2.0
    acceptance:
    - pigeon_pairing_record_serialize writes to caller-provided buffer
    - pigeon_pairing_record_deserialize reads from buffer into caller-provided struct
    - 'Round-trip test: serialize then deserialize produces identical record'
    - No heap allocations in either path
    context: 'pigeon_pairing_record struct exists but has no serialise/deserialise. Must be zero-alloc (no cJSON). Fixed schema: write fields in known order with length prefixes or fixed offsets.'
    depends_on:
    - T11.1
    origin: manual
    discovered: 2026-04-14
    achieved: 2026-04-15
  T11.4:
    name: ngtcp2 QUIC transport implementation
    status: identified
    value: 5.0
    cost: 8.0
    acceptance:
    - pigeon_transport_ngtcp2 struct implements the pigeon_transport interface
    - QUIC connection to relay server establishes successfully
    - Stream send/recv works through relay
    - Datagram send/recv works through relay
    - Zero heap allocations in the transport layer (caller provides all buffers)
    - TLS backend (BoringSSL or OpenSSL) is integrated for QUIC handshake
    context: The transport is currently an abstract callback struct. ngtcp2 is the chosen QUIC library (pure C, custom allocator capable). This is the largest piece — requires QUIC connection setup, stream management, datagram support, and TLS integration (likely via BoringSSL since ngtcp2 requires a TLS backend). May want to further decompose when starting.
    depends_on:
    - T11.2
    origin: manual
    discovered: 2026-04-14
  T12:
    name: Cascading relay architecture explored
    status: achieved
    value: 3.0
    cost: 3.0
    acceptance:
    - 'Design document covering: local relay registers as a backend to a public relay, local relay also accepts backend registrations from game servers, players authenticate once against the local relay and get routed to game servers'
    - Interaction model between relay-as-backend and relay-as-relay is defined
    - Implications for auth, session multiplexing, and the 1:1 instance model are assessed
    context: 'Motivated by squz/ge: a local development relay that fronts multiple game servers. Players authenticate once against the local relay rather than each game server individually. The local relay acts as both a backend (to the public relay) and a relay (to the game servers). This is more than transport cascading — it''s a mediation layer between player-facing auth and per-game-server identity. The current 1:1 (one backend, one client per instance) model doesn''t cover this topology.'
    origin: manual
    discovered: 2026-04-12
    achieved: 2026-04-15
  T13:
    name: Protocol framework supports composable parallel sub-machines per actor
    status: achieved
    value: 8.0
    cost: 8.0
    observable: true
    acceptance:
    - 'YAML schema supports machines: section under each actor with per-machine initial state, transitions, reports (events emitted upward), and accepts (events received from other machines)'
    - 'YAML schema supports a routes: section declaring inter-machine event wiring with from qualifier and guard conditions'
    - Protocol parser (yaml.go) loads and validates the composition schema
    - Go code generator emits per-sub-machine structs with dispatch functions plus a containing struct that routes events between sub-machines
    - C code generator emits equivalent per-sub-machine structs and dispatch
    - Swift and Kotlin generators emit equivalent composition
    - TLA+ generator models sub-machines as concurrent processes with shared variables for inter-machine events
    - Existing non-composed protocols (pairing.yaml) continue to work unchanged
    context: 'Currently each actor in a protocol has one flat state machine. The pathswitch protocol entangles transport lifecycle, path selection, and session management in a single machine. Composable sub-machines let each concern be a small independent machine (3-5 states) that reports events upward and receives events from peers via a declared routing table. The routing table is the composition model — visible to TLA+ for formal verification of interleavings. This enables: (1) refactoring pathswitch into relay/LAN/session sub-machines, (2) adding localhost as a trivial new sub-machine, (3) adding future transports (Bluetooth, STUN) without touching existing machines. Design discussion in session 2026-04-12 established the architecture.'
    origin: manual
    discovered: 2026-04-13
    achieved: 2026-04-13
  T14:
    name: Pairing ceremony decomposed into pairing and auth sub-machines
    status: achieved
    value: 5.0
    cost: 3.0
    observable: true
    acceptance:
    - 'pairing.yaml uses machines: with two sub-machines: pairing (QR→ECDH→confirmation→store) and auth (present credential→session established)'
    - Routes wire pairing completion into auth (pairing reports paired, auth accepts credential_ready)
    - Exact same observable behavior as today — no semantic change, just structural decomposition
    - All codegen backends produce valid output
    - Existing tests pass unchanged
    context: 'The current pairing.yaml has one flat machine per actor that handles both the initial pairing ceremony (QR, ECDH, confirmation codes) and the reconnection auth flow (auth_request/auth_ok). These are logically independent — pairing runs once, auth runs on every reconnect. Splitting them into composable sub-machines using the new composition framework enables future work: decoupling auth credentials from transport topology (relay URL, instance ID), persistent tokens, and alternative auth mechanisms. The coupling between pairing and auth is light — pairing produces a PairingRecord, auth consumes it. Cost is low because it''s a YAML restructuring + verification, not new logic.'
    origin: manual
    discovered: 2026-04-13
    achieved: 2026-04-13
  T15:
    name: One-time token pairing with credential issuance and multi-client relay
    status: identified
    value: 8.0
    cost: 8.0
    acceptance:
    - One-time pairing token is consumed at pair_hello acceptance, not at pairing completion — closing the concurrent-race window
    - IssueCredential() server-side API generates and registers credentials without running the pairing ceremony
    - Auth sub-machine validates credentials identically regardless of origin (ceremony or injection)
    - Relay supports multiple concurrent authenticated clients per backend registration
    - TLA+ model includes a second device actor that verifies spent tokens are rejected
    - 'SecondDeviceRejected property: a consumed token causes any subsequent pair_hello to fail'
    - Confirmation code ceremony is implemented in Go/Swift runtime (not just modeled in TLA+)
    - Credential format is defined by pigeon — apps store and present opaque blobs
    context: 'Pigeon''s current relay is 1:1 (one backend, one client) with reusable instance IDs. The target use case (ged + ge) requires: (1) one-time QR tokens consumed on first use, (2) credential issuance so devices can reconnect without re-scanning, (3) multiple authorized clients connected to one backend concurrently. The pairing ceremony handles interactive auth (QR + ECDH + confirmation code); an IssueCredential() API supports automated injection (xcrun, simulators). Pigeon owns credential format and validation; apps own storage (enclave, keychain, etc).'
    tags:
    - security
    - protocol
    - relay
    origin: manual
    discovered: 2026-04-13
  T2:
    name: Multi-transport with LAN upgrade
    status: converging
    value: 5.0
    cost: 6.0
    acceptance:
    - Devices connected through relay can discover same LAN and upgrade to direct connection
    - pigeon.Conn abstraction hides transport — callers see single ordered message stream
    context: '1/3 sub-targets achieved: T3.1 (LAN discovery) is covered by the PathSwitch state machine (protocol/pathswitch.yaml, formal/PathSwitch.tla, executor.go, lan.go). The existing implementation already handles single-active-path switching with challenge-response verification, health monitoring (ping/pong, 3-strike failure threshold), and exponential-backoff automatic fallback. Remaining sub-targets: T2.1 (cutover with sequence-ordered delivery) and T2.2 (transparent downgrade, multi-source receive). These may need re-scoping: the current design trades a bounded in-flight-message-loss window at cutover for dramatically simpler code — if that trade-off is acceptable, T2.1 collapses to "document the loss window" and T2.2 mainly needs the downgrade path wired up automatically rather than explicitly.'
    depends_on:
    - T2.1
    - T2.2
    - T3.1
    origin: bootstrap from targets.md (T5)
    discovered: 2026-04-08
  T2.1:
    name: Cutover protocol
    status: identified
    value: 5.0
    cost: 5.0
    acceptance:
    - Each side sends CUTOVER marker as final message on old transport
    - Receiver reads from both transports, orders by sequence number
    - Old transport closed after receiving CUTOVER
    context: 'FrameCutover (0x02) byte is defined in session_gen.go and detected in executor.go:735, but currently logged and discarded rather than processed as a state transition. The PathSwitch protocol (protocol/pathswitch.yaml) has no cutover messages at all — it uses single-active-path switching via dispatcher_path rebinding, not a sequence-numbered dual-path cutover. The acceptance criteria as written require: (1) sequence-numbered messages on the wire, (2) concurrent dual-path read, (3) deterministic ordering across paths during switch. That is a design change, not an incremental extension. Decision needed before coding: is dual-path operation worth the complexity (requires sequence numbering everywhere, affects encryption nonce design, doubles receive-loop state) vs accepting a bounded in-flight-loss window at cutover (handled today by relay_resume / rebridge). If the latter, this target should be reframed to "switching is loss-free within a documented bound" and T3''s TLA+ scope shrinks accordingly.'
    depends_on:
    - T3
    - T13
    origin: bootstrap from targets.md (T5.3)
    discovered: 2026-04-08
  T2.2:
    name: Transport-agnostic Conn
    status: identified
    value: 5.0
    cost: 6.0
    acceptance:
    - pigeon.Conn manages multiple underlying transports
    - Sends go on preferred transport; receives from any transport in sequence order
    - Upgrading and downgrading transparent to caller
    context: 'Upgrade direction works: the `path` struct (path.go) and executor.go activePath() pattern transparently route sends/recvs through whichever path the state machine has marked active, and LAN installation is invisible to callers. Two gaps remain: (a) automatic downgrade on LAN failure is not wired — fallbackToRelay() (conn.go:258-260) is an explicit app call, not driven by the PathSwitch RelayFallback transition; (b) sends/recvs do not merge multiple transports — only activePath is read from, so any "receive in sequence order from any transport" behaviour isn''t there. Substantially blocked by the T2.1 design decision: if dual-path operation is rejected, this target simplifies to just wiring the automatic downgrade path.'
    depends_on:
    - T3.1
    - T2.1
    origin: bootstrap from targets.md (T5.4)
    discovered: 2026-04-08
  T3:
    name: TLA+ model for cutover protocol
    status: identified
    value: 3.0
    cost: 5.0
    acceptance:
    - TLA+ spec verifies no message lost during cutover
    - No message duplicated
    - No message delivered out of order
    - No deadlock
    - Concurrent cutover initiation from both sides is safe
    context: 'formal/PathSwitch.tla and PathSwitch.cfg exist and verify the RESOURCE LIFECYCLE of the PathSwitch state machine: dispatcher always bound, monitor only when LAN active, backoff bounded, LAN requires verification, relay always available. These are structural invariants, not message-sequencing invariants. The model does NOT have a MessageLog variable, does NOT model cutover markers, does NOT verify "no message lost/duplicated/reordered during cutover", and active_path is modelled as {"relay", "lan"} so dual-path operation isn''t expressible. To achieve T3 as written requires either (a) extending PathSwitch.tla with a message-log abstraction and concurrent-cutover scenario, or (b) rewriting T3''s acceptance to match the resource-lifecycle invariants that are already proven. Blocked on the T2.1 design decision.'
    origin: bootstrap from targets.md (T10)
    discovered: 2026-04-08
